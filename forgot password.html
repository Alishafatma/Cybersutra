<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
background-image:url("https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=1974&auto=format&fit=crop");
background-size:cover;
align-items:center;
height:100vh;
color:#fff;
}

.container{
width:350px;
padding:25px;
border-radius:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
outline:none;
background:rgba(255,255,255,0.1);
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
cursor:pointer;
margin-top:5px;
}

.hidden{
display:none;
}

.error{
color:#ff6b6b;
font-size:13px;
margin-bottom:10px;
}

.success{
color:#4caf50;
font-size:13px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Reset Password 🔑</h2>

<!-- STEP 1 -->
<div id="step1">
<input type="email" id="email" placeholder="Enter your email">
<button onclick="sendOTP()">Send OTP</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
<input type="text" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
<input type="password" id="newPass" placeholder="New Password">
<input type="password" id="confirmPass" placeholder="Confirm Password">
<button onclick="resetPassword()">Reset Password</button>
</div>

<div id="msg"></div>

</div>

<script>

let generatedOTP = "";

/* STEP 1 */
function sendOTP(){

let email = document.getElementById("email").value;
let msg = document.getElementById("msg");

if(email === ""){
msg.innerHTML = "<div class='error'>Enter email first</div>";
return;
}

/* FAKE OTP */
generatedOTP = Math.floor(1000 + Math.random() * 9000);

alert("📩 OTP sent to your email: " + generatedOTP);

document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");

msg.innerHTML = "<div class='success'>OTP sent successfully</div>";
}

/* STEP 2 */
function verifyOTP(){

let userOTP = document.getElementById("otp").value;
let msg = document.getElementById("msg");

if(userOTP == generatedOTP){
msg.innerHTML = "<div class='success'>OTP Verified</div>";

document.getElementById("step2").classList.add("hidden");
document.getElementById("step3").classList.remove("hidden");

}else{
msg.innerHTML = "<div class='error'>Invalid OTP</div>";
}
}

/* STEP 3 */
function resetPassword(){

let pass = document.getElementById("newPass").value;
let confirm = document.getElementById("confirmPass").value;
let msg = document.getElementById("msg");

if(pass.length < 6){
msg.innerHTML = "<div class='error'>Password must be 6+ characters</div>";
return;
}

if(pass !== confirm){
msg.innerHTML = "<div class='error'>Passwords do not match</div>";
return;
}

/* UPDATE PASSWORD */
let user = JSON.parse(localStorage.getItem("user"));

if(user){
user.password = pass;
localStorage.setItem("user", JSON.stringify(user));
}

msg.innerHTML = "<div class='success'>Password Reset Successful 🎉</div>";

setTimeout(()=>{
window.location.href = "index.html";
},2000);

}

</script>

</body>
</html>
